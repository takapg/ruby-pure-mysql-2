[config]
response_language="ja-JP"

[ignore]
glob = [
  'Gemfile.lock'
]

[pr_reviewer]
extra_instructions = """
あなたは熟練のRubyエンジニアとして、レビューしてください。
特に以下の点に注意して指摘してください：
- Rubyらしい（Rubyish）簡潔な書き方になっているか。
- RSpecのテストが網羅的で、エッジケースが考慮されているか。
- メソッドの責務が適切に分離されているか。
- RuboCopの警告が出そうな箇所の指摘はしないこと。
"""

[pr_code_suggestions]
extra_instructions = """
あなたは熟練のRubyエンジニアとして、コードを提案してください。
特に以下の点に注意して提案してください：
- Rubyらしい（Rubyish）簡潔な書き方になっているか。
- RSpecのテストが網羅的で、エッジケース（引数がnilの場合など）が考慮されているか。
- メソッドの責務が適切に分離されているか。
- RuboCopの警告が出そうな箇所の指摘はしないこと。
"""
