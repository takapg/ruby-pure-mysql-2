name: Auto Dev Handler

on:
  issues:
    types: [opened]

jobs:
  init-auto-dev:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post launch checkbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body "
          ## 🤖 Auto-Dev Launcher

          - [ ] launch auto-dev

          この Issue の実装を開始するには、上記のチェックボックスをオンにしてください。
          "

  launch-auto-dev:
    if: |
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '- [x] launch auto-dev')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and Draft PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH_NAME="aider/issue-$ISSUE_NUMBER"
          
          # ブランチ作成と空コミット
          git checkout -b "$BRANCH_NAME"
          git commit --allow-empty -m "chore: start auto-dev for #$ISSUE_NUMBER"
          git push origin "$BRANCH_NAME"
          
          # Draft PR の作成
          PR_URL=$(gh pr create \
            --draft \
            --title "auto-dev: $ISSUE_TITLE" \
            --body "Closes: #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH_NAME")
            
          # PRへの初回指示コメント (これで Aider が動き出す)
          gh pr comment $PR_URL --body "/aider-code"
