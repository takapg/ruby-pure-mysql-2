name: Auto Dev Handler

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created, edited]

jobs:
  init-auto-dev:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post launch checkbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body "
          ## 🤖 Auto-Dev Launcher

          - [ ] launch auto-dev

          この Issue の実装を開始するには、上記のチェックボックスをオンにしてください。
          "

  launch-auto-dev:
    if: |
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '- [x] launch auto-dev')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and Draft PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH_NAME="aider/issue-$ISSUE_NUMBER"
          
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null; then
            git checkout "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
            git commit --allow-empty -m "chore: start auto-dev for #$ISSUE_NUMBER"
            git push origin "$BRANCH_NAME"
          fi

          PR_URL=$(gh pr list --head "$BRANCH_NAME" --base main --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
            --draft \
            --title "auto-dev: $ISSUE_TITLE" \
            --body "Closes: #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH_NAME")
          fi

          gh pr comment $PR_URL --body "/aider-code"
