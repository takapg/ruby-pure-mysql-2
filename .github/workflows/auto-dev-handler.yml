name: Auto Dev Handler

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created, edited]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request_review:
    types: [submitted]

jobs:
  init-auto-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Post launch command
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body '
          この Issue の実装を開始するには、下記のコマンドをコメントしてください。

          ```
          /auto-dev launch
          ```
          '

  launch-auto-dev:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      github.event.action == 'created' &&
      startsWith(github.event.comment.body, '/auto-dev launch') &&
      (
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
        contains(fromJson('["github-actions[bot]","takapg-app[bot]"]'), github.event.comment.user.login)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and Draft PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH_NAME="auto-dev/issue-$ISSUE_NUMBER"
          
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null; then
            git fetch origin "$BRANCH_NAME":"$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
            git commit --allow-empty -m "chore: start auto-dev for #$ISSUE_NUMBER"
            git push origin "$BRANCH_NAME"
          fi

          PR_URL=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH_NAME" --base main --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
            --draft \
            --title "auto-dev: $ISSUE_TITLE" \
            --body "Closes: #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH_NAME")
          fi

          gh pr comment $PR_URL --repo ${{ github.repository }} --body "/auto-dev code"

  dispatch-aider-code:
    if: |
      startsWith(github.event.issue.title, 'auto-dev:') &&
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/auto-dev code') &&
      (
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
        contains(fromJson('["github-actions[bot]","takapg-app[bot]"]'), github.event.comment.user.login)
      )

    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Fetch PR and Issue Context via API
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PR_DATA=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json title,body,headRefName)
          PR_TITLE=$(echo "$PR_DATA" | jq -r .title)
          PR_BODY=$(echo "$PR_DATA" | jq -r .body)
          BRANCH_NAME=$(echo "$PR_DATA" | jq -r .headRefName)

          if [[ "$BRANCH_NAME" =~ ^auto-dev/issue-([0-9]+)$ ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
            ISSUE_DATA=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json title,body)
            ISSUE_CONTEXT="【元の Issue #$ISSUE_NUM】\nタイトル: $(echo "$ISSUE_DATA" | jq -r .title)\n本文: $(echo "$ISSUE_DATA" | jq -r .body)"
          fi

          RAW_INSTRUCTION=$(printf '%s' "$COMMENT_BODY" | sed '1s#^/auto-dev code##')

          FULL_MESSAGE=$(cat <<EOF
          以下の文脈を理解して、コードを編集してください。

          $ISSUE_CONTEXT

          【現在の PR 状況】
          タイトル: $PR_TITLE
          内容: $PR_BODY

          【追加の指示】
          ${RAW_INSTRUCTION:-"Issue の解決に向けて自律的に実装を進めてください。"}
          EOF
          )

          gh workflow run aider-code.yml \
            --repo ${{ github.repository }} \
            --ref "$BRANCH_NAME" \
            -f instruction="$FULL_MESSAGE"

  ci-failure-dispatch:
    if: |
      startsWith(github.event.workflow_run.head_branch, 'auto-dev') &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Relay CI failure to Aider
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run."
            exit 0
          fi

          FAILED_JOBS=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | {name: .name, id: .id}')
          
          ERROR_LOGS=""
          while IFS= read -r job; do
            JOB_NAME=$(echo "$job" | jq -r '.name')
            JOB_ID=$(echo "$job" | jq -r '.id')
            LOG=$(gh api "/repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" 2>&1 | tail -n 50)
            ERROR_LOGS="${ERROR_LOGS}\n### ${JOB_NAME}\n\`\`\`\n${LOG}\n\`\`\`\n"
          done < <(echo "$FAILED_JOBS" | jq -c .)
          # Aider に修正を依頼するコメントを投稿
          gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "/auto-dev code
          ❌ CI が失敗しました。
          エラー内容を確認し、修正を行ってください。
          <details>
          <summary>エラーログ</summary>
          ${ERROR_LOGS}
          </details>
          "

  promote-pr-on-success:
    if: |
      startsWith(github.event.workflow_run.head_branch, 'auto-dev') &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Promote PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "@coderabbitai resume"
          fi

          IS_DRAFT=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json isDraft --jq '.isDraft')

          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready $PR_NUMBER --repo ${{ github.repository }}
            gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "✅ CI がすべて成功しました！<br>Draft を解除し、レビューを開始します。"
          else
            echo "PR #$PR_NUMBER is already open. Skipping promotion."
          fi

  review-dispatch:
    if: |
      startsWith(github.event.pull_request.title, 'auto-dev:') &&
      github.event_name == 'pull_request_review' &&
      github.event.action == 'submitted' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      contains(github.event.review.body, 'Prompt for all review comments with AI agents')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Relay Review to Aider
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -e
          gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "@coderabbitai pause"

          cat << 'COMMENT_EOF' > rabbit_comment.txt
          /auto-dev code
          🐰 CodeRabbit からのレビュー指摘を反映してください。

          ---
          COMMENT_EOF

          echo "$REVIEW_BODY" >> rabbit_comment.txt
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file=rabbit_comment.txt

  finish-auto-dev:
    if: |
      startsWith(github.event.issue.title, 'auto-dev:') &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'coderabbitai[bot]' &&
      contains(github.event.comment.body, 'No actionable comments were generated in the recent review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post completion message
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "🏁 completed! 🏁<br>CodeRabbit による最終レビューを突破しました！"
