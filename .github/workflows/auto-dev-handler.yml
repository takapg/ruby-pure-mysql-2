name: Auto Dev Handler

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created, edited]

jobs:
  init-auto-dev:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post launch checkbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body "
          ## 🤖 Auto-Dev Launcher

          - [ ] launch auto-dev

          この Issue の実装を開始するには、上記のチェックボックスをオンにしてください。
          "

  launch-auto-dev:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '- [x] launch auto-dev') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and Draft PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH_NAME="aider/issue-$ISSUE_NUMBER"
          
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null; then
            git fetch origin "$BRANCH_NAME":"$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
            git commit --allow-empty -m "chore: start auto-dev for #$ISSUE_NUMBER"
            git push origin "$BRANCH_NAME"
          fi

          PR_URL=$(gh pr list --head "$BRANCH_NAME" --base main --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
            --draft \
            --title "auto-dev: $ISSUE_TITLE" \
            --body "Closes: #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH_NAME")
          fi

          gh pr comment $PR_URL --body "/aider-code"

  dispatch-aider-code:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/aider-code')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v1.11.6
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Fetch PR and Issue Context via API
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_DATA=$(gh pr view $PR_NUMBER --json title,body,headRefName)
          PR_TITLE=$(echo "$PR_DATA" | jq -r .title)
          PR_BODY=$(echo "$PR_DATA" | jq -r .body)
          BRANCH_NAME=$(echo "$PR_DATA" | jq -r .headRefName)

          if [[ "$BRANCH_NAME" =~ aider/issue-([3-11]+) ]]; then
            ISSUE_NUM="${BASH_REMATCH[3]}"
            ISSUE_DATA=$(gh issue view $ISSUE_NUM --json title,body)
            ISSUE_CONTEXT="【元の Issue #$ISSUE_NUM】\nタイトル: $(echo "$ISSUE_DATA" | jq -r .title)\n本文: $(echo "$ISSUE_DATA" | jq -r .body)"
          fi

          RAW_INSTRUCTION=$(echo "${{ github.event.comment.body }}" | sed 's/^\/aider-code//' | xargs)

          FULL_MESSAGE=$(cat <<EOF
          以下の文脈を理解して、コードを編集してください。

          $ISSUE_CONTEXT

          【現在の PR 状況】
          タイトル: $PR_TITLE
          内容: $PR_BODY

          【追加の指示】
          ${RAW_INSTRUCTION:-"Issue の解決に向けて自律的に実装を進めてください。"}
          EOF
          )

          gh workflow run aider-code.yml \
            --ref "$BRANCH_NAME" \
            -f instruction="$FULL_MESSAGE"
