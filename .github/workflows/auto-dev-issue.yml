name: Auto Dev Issue

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Issue のタイトル（空の場合は AI が自動で次の一手を選択）'
        required: false
        default: ''

jobs:
  auto-dev-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.11'

      - name: Generate Issue via AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_INPUT: ${{ github.event.inputs.title }}
        run: |
          docker run -v .:/app --rm ghcr.io/yamadashy/repomix
          uv run --with google-genai --with pydantic python .github/workflows/scripts/generate_issue.py

      - name: Create Issue on GitHub
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat issue.json | jq
          
          TITLE=$(jq -r '.title' issue.json)
          BODY=$(jq -r '.body' issue.json)

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --repo ${{ github.repository }}
