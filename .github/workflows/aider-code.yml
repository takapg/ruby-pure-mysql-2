name: Aider Code

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'AIに指示したい内容'
        required: true
        default: ''
  issue_comment:
    types: [created]

jobs:
  aider-code:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        github.event_name == 'issue_comment' &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR') &&
        startsWith(github.event.comment.body, '/aider-code')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create or Switch to Issue Branch
        if: github.event_name == 'issue_comment'
        run: |
          BRANCH_NAME="aider/issue-${{ github.event.issue.number }}"
          git fetch origin

          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
            git checkout "$BRANCH_NAME"
          elif git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
            git checkout -b "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
          fi

      - name: Start MySQL in background
        run: docker compose up -d > /dev/null 2>&1 &

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '.ruby-version'
          bundler-cache: true

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.11'

      - name: Install Aider
        run: |
          uv tool install aider-chat

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Wait for MySQL to be ready
        run: |
          MAX_ATTEMPTS=60
          ATTEMPT_NUM=1
          until docker compose exec -T mysql-real mysql -h 127.0.0.1 -u root -e "SELECT version();" > /dev/null 2>&1; do
            if [ $ATTEMPT_NUM -ge $MAX_ATTEMPTS ]; then
              echo "Error: MySQL did not start after $MAX_ATTEMPTS attempts."
              docker compose ps
              docker compose logs mysql-real --tail=200
              exit 1
            fi
            echo "Waiting for MySQL to start (Attempt: $ATTEMPT_NUM/$MAX_ATTEMPTS)..."
            sleep 1
            ATTEMPT_NUM=$((ATTEMPT_NUM + 1))
          done
          echo "MySQL is up and running!"

      - name: Run AI Agent CLI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAW_INSTRUCTION: ${{ github.event.comment.body || github.event.inputs.instruction }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          INSTRUCTION=$(echo "$RAW_INSTRUCTION" | sed -e 's|^\/aider[[:space:]]*||')

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            if [ -z "$(echo "$INSTRUCTION" | tr -d '[:space:]')" ]; then
              INSTRUCTION="提示されたIssueのタイトルと本文を解析し、発生している問題の修正や要望の割り当て、テストの追加などを自律的に行ってください。"
            fi

            FULL_MESSAGE=$(cat <<EOF
          以下のIssue内容と人間からの指示を元に、コードを編集してください。
          
          【人間からの指示】
          $INSTRUCTION
          
          【背景にあるIssue内容】
          タイトル: $ISSUE_TITLE
          本文:
          $ISSUE_BODY
          EOF
          )
          else
            FULL_MESSAGE="$INSTRUCTION"
          fi

          echo "Executing: $FULL_MESSAGE"

          aider --model gemini/gemini-3.1-flash-lite \
                --editor-model gemini/gemini-3.1-flash-lite \
                --weak-model gemini/gemini-3.1-flash-lite \
                --yes-always \
                --chat-language japanese \
                --architect \
                --test-cmd "bundle exec rspec && bundle exec rubocop" \
                --auto-test \
                --no-attribute-author \
                --no-attribute-committer \
                --no-attribute-co-authored-by \
                --message "$FULL_MESSAGE"

      - name: Push changes
        run: |
          git push -u origin HEAD
