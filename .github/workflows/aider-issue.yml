name: Aider Issue

on:
  workflow_dispatch:
    inputs:
      target_issue_number:
        description: '更新したい既存のIssue番号 (空の場合は新規作成)'
        required: false
        default: ''

jobs:
  aider-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
