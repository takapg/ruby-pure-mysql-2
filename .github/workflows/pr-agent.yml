name: PR Agent
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  # issue_comment:
jobs:
  pr_agent_job:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@0bd56c0508504c718cc03d504cd4ceb6725ba3c7 # v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gemini/gemma-4-31b-it"
          config.fallback_models: '["gemini/gemini-3.1-flash-lite"]'
          config.custom_model_max_tokens: "8192"
          config.ai_timeout: "1200"
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"
